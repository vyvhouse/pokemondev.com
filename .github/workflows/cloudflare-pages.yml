name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static artifact
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js
          rm -rf dist
          mkdir -p dist
          cp index.html styles.css script.js dist/
          cp -R assets dist/assets

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        run: |
          npx wrangler@latest pages deploy dist \
            --project-name="${{ vars.CLOUDFLARE_PAGES_PROJECT || 'pokemondev-com' }}" \
            --branch="${{ github.head_ref || github.ref_name }}" \
            --commit-dirty=true
